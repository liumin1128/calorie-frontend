<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" fill="none">
  <defs>
    <filter id="plateShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#3d6b4f" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="plateGrad" x1="250" y1="290" x2="250" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f7f5ef"/>
      <stop offset="100%" stop-color="#e8e4d8"/>
    </linearGradient>
    <linearGradient id="appleGrad" x1="290" y1="160" x2="340" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef7b5a"/>
      <stop offset="100%" stop-color="#d4543a"/>
    </linearGradient>
    <linearGradient id="avoSkin" x1="100" y1="180" x2="180" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b9b5e"/>
      <stop offset="100%" stop-color="#4a7a40"/>
    </linearGradient>
    <linearGradient id="avoFlesh" x1="120" y1="200" x2="160" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4e8a0"/>
      <stop offset="100%" stop-color="#b8d468"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="190" y1="195" x2="240" y2="275" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbb040"/>
      <stop offset="100%" stop-color="#f49420"/>
    </linearGradient>
    <linearGradient id="leafGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fb98e"/>
      <stop offset="100%" stop-color="#5a9a6a"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#81c784"/>
    </linearGradient>
  </defs>

  <!-- Background decorative shapes -->
  <circle cx="75" cy="95" r="55" fill="#e8f3e8" opacity="0.45"/>
  <circle cx="420" cy="75" r="68" fill="#fce8d4" opacity="0.35"/>
  <circle cx="405" cy="355" r="38" fill="#e8f3e8" opacity="0.25"/>
  <ellipse cx="240" cy="400" rx="200" ry="18" fill="#e0ddd5" opacity="0.3"/>

  <!-- Large decorative leaf (top-left) -->
  <g transform="translate(55, 140) rotate(-25)">
    <path d="M0 0 C18-38 52-42 62-16 C55 12 24 20 0 0Z" fill="url(#leafGrad1)" opacity="0.65"/>
    <path d="M2 0 C16-18 38-22 52-10" stroke="#5a9a6a" stroke-width="1.2" fill="none" opacity="0.5"/>
  </g>

  <!-- Decorative leaf (top-right) -->
  <g transform="translate(395, 115) rotate(18)">
    <path d="M0 0 C-14-30 -42-34 -50-12 C-44 8 -18 15 0 0Z" fill="url(#leafGrad2)" opacity="0.5"/>
    <path d="M-2 0 C-14-14 -32-18 -42-8" stroke="#81c784" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Main plate -->
  <g filter="url(#plateShadow)">
    <ellipse cx="250" cy="340" rx="192" ry="50" fill="url(#plateGrad)"/>
    <ellipse cx="250" cy="334" rx="178" ry="42" fill="#faf8f2"/>
    <ellipse cx="250" cy="332" rx="165" ry="36" fill="#fdfcf8"/>
  </g>

  <!-- Avocado half -->
  <g transform="translate(140, 230) rotate(-14)">
    <ellipse cx="0" cy="0" rx="52" ry="68" fill="url(#avoSkin)"/>
    <ellipse cx="0" cy="-2" rx="40" ry="52" fill="url(#avoFlesh)"/>
    <ellipse cx="2" cy="8" rx="17" ry="21" fill="#6d4c41" opacity="0.75"/>
    <ellipse cx="0" cy="5" rx="13" ry="17" fill="#8d6e63"/>
    <ellipse cx="-4" cy="1" rx="5" ry="7" fill="#fff" opacity="0.12"/>
  </g>

  <!-- Orange slice -->
  <g transform="translate(225, 245)">
    <circle cx="0" cy="0" r="44" fill="url(#orangeGrad)"/>
    <circle cx="0" cy="0" r="37" fill="#fcc860" opacity="0.65"/>
    <line x1="0" y1="-33" x2="0" y2="33" stroke="#f49420" stroke-width="1.5" opacity="0.45"/>
    <line x1="-33" y1="0" x2="33" y2="0" stroke="#f49420" stroke-width="1.5" opacity="0.45"/>
    <line x1="-23" y1="-23" x2="23" y2="23" stroke="#f49420" stroke-width="1.5" opacity="0.45"/>
    <line x1="-23" y1="23" x2="23" y2="-23" stroke="#f49420" stroke-width="1.5" opacity="0.45"/>
    <circle cx="0" cy="0" r="6" fill="#fbb040"/>
  </g>

  <!-- Apple -->
  <g transform="translate(335, 215)">
    <path d="M0-52 C28-62 52-32 47 12 C42 54 16 68 0 72 C-16 68 -42 54 -47 12 C-52-32 -28-62 0-52Z" fill="url(#appleGrad)"/>
    <path d="M-16-32 C-4-44 12-38 18-22 C10-28 -6-34 -16-32Z" fill="#fff" opacity="0.18"/>
    <path d="M0-52 C3-64 4-70 2-75" stroke="#6d4c41" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M3-66 C12-78 26-72 22-60 C18-52 8-58 3-66Z" fill="#7fb98e"/>
  </g>

  <!-- Blueberries cluster -->
  <g transform="translate(285, 312)">
    <circle cx="0" cy="0" r="13" fill="#7c6bc4"/>
    <circle cx="20" cy="-5" r="12" fill="#9080d0"/>
    <circle cx="10" cy="15" r="11" fill="#8570c8"/>
    <circle cx="-10" cy="12" r="10" fill="#7060b8"/>
    <circle cx="-2" cy="-3" r="2.5" fill="#fff" opacity="0.22"/>
    <circle cx="18" cy="-8" r="2" fill="#fff" opacity="0.22"/>
    <circle cx="8" cy="12" r="1.8" fill="#fff" opacity="0.18"/>
  </g>

  <!-- Banana -->
  <g transform="translate(375, 295) rotate(-28)">
    <path d="M-35 6 C-24-18 14-24 36-6 C30 8 -8 18 -35 6Z" fill="#f7d96e"/>
    <path d="M-32 5 C-22-14 12-18 32-4" stroke="#e8c44a" stroke-width="1.2" fill="none" opacity="0.45"/>
    <path d="M-30 4 C-24-4 -10-10 5-8" fill="#fff" opacity="0.12"/>
  </g>

  <!-- Small leaf near plate (left) -->
  <g transform="translate(88, 320) rotate(12)">
    <path d="M0 0 C10-22 28-25 34-10 C30 5 14 10 0 0Z" fill="#7fb98e" opacity="0.55"/>
  </g>

  <!-- Small leaf near plate (right) -->
  <g transform="translate(400, 310) rotate(-8)">
    <path d="M0 0 C-8-18 -24-20 -28-8 C-24 4 -10 8 0 0Z" fill="#a5d6a7" opacity="0.45"/>
  </g>

  <!-- Floating particles -->
  <circle cx="148" cy="88" r="4" fill="#ef7b5a" opacity="0.28"/>
  <circle cx="385" cy="168" r="3.5" fill="#7fb98e" opacity="0.35"/>
  <circle cx="438" cy="275" r="3" fill="#fbb040" opacity="0.28"/>
  <circle cx="56" cy="295" r="3" fill="#9080d0" opacity="0.25"/>
  <circle cx="325" cy="68" r="4" fill="#7fb98e" opacity="0.28"/>
  <circle cx="200" cy="110" r="2.5" fill="#f7d96e" opacity="0.3"/>
  <circle cx="450" cy="200" r="2.5" fill="#ef7b5a" opacity="0.2"/>
</svg>
